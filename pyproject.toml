[tool.ruff]
line-length = 88
target-version = "py310"
src = ["src", "dataloaders", "scripts", "validation"]
extend-exclude = ["data", "notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.ruff.lint.per-file-ignores]
"validation/matpower/matpower_pf_soundness.py" = ["E741"]